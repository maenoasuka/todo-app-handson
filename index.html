<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODOアプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <header class="app-header">
      <h1 class="app-title">📝 TODOアプリ</h1>
    </header>

    <main class="app-main">

      <!-- タスク入力エリア -->
      <section class="task-form">
        <label for="task-input" class="task-form__label">新しいタスク</label>
        <div class="task-form__row">
          <input
            type="text"
            id="task-input"
            class="task-form__input"
            placeholder="タスクを入力してください"
          >
          <button type="button" class="btn btn--primary task-form__button">追加</button>
        </div>
      </section>

      <!-- タスク一覧エリア -->
      <section class="task-list-section">
        <h2 class="task-list-section__title">タスク一覧</h2>

        <ul class="task-list" id="task-list">
          <!-- JavaScriptで動的に描画 -->
        </ul>
      </section>

    </main>

    <footer class="app-footer">
      <p class="app-footer__text" id="task-count">0件中 0件完了</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
